[workspace]
authors = ["Jim Li <yunjin.li0817@gmail.com>"]
channels = ["conda-forge"]
name = "ShapeR"
platforms = ["linux-64"]
version = "0.1.0"

[dependencies]
python = "3.10.*"
gcc_linux-64 = "11.*"
gxx_linux-64 = "11.*"
sparsehash = ">=2.0.4,<3"

[pypi-options]
extra-index-urls = ["https://download.pytorch.org/whl/cu128"]
no-build-isolation = ["flash-attn"]

[pypi-dependencies]
wheel = ">=0.46.3, <0.47"
setuptools = "*"
ninja = ">=1.13.0, <2"
numpy = ">=2.2.6, <3"
tqdm = "*"
hydra-core = ">=1.3.2, <2"
matplotlib = ">=3.10.8, <4"
opencv-python = ">=4.13.0.92, <5"
imageio = { version = ">=2.37.3, <3", extras = ["pyav"] }
easydict = ">=1.13, <2"
munch = ">=4.0.0, <5"
plyfile = ">=1.1.3, <2"
transformers = ">=5.5.0, <6"
trimesh = ">=4.11.5, <5"
scikit-image = ">=0.25.2, <0.26"
diffusers = ">=0.37.1, <0.38"
gradio = ">=6.11.0, <7"
peft = ">=0.18.1, <0.19"
einops = ">=0.8.2, <0.9"
pymeshlab = ">=2022.2.post3, <2023"
sophuspy = ">=1.2.0, <2"
fast-simplification = ">=0.1.13, <0.2"
scikit-learn = ">=1.7.2, <2"
timm = ">=1.0.26, <2"
plotly = ">=6.6.0, <7"
torchdiffeq = ">=0.2.5, <0.3"
sentencepiece = ">=0.2.1, <0.3"
protobuf = ">=7.34.1, <8"
pyrender = ">=0.1.45, <0.2"
jupyter = ">=1.1.1, <2"
torch = "==2.7.1"
torchvision = "==0.22.1"
torchaudio = "==2.7.1"
pip = ">=26.0.1, <27"
fpsample = ">=1.0.2, <2"
hatchling = ">=1.25.0, <2"

[activation]
scripts = ["setup_cuda.sh"]

[tasks]
install-flashattn = {cmd = "pip install flash-attn --no-build-isolation --no-cache-dir"}
install-torchcluster = {cmd = "pip install torch-cluster -f https://data.pyg.org/whl/torch-2.7.1+cu128.html"}
install-torchsparse = {cmd = "pip install --verbose git+https://github.com/nihalsid/torchsparse@legacy --no-build-isolation"}
install-submodules = { depends-on = [
    "install-flashattn",
    "install-torchcluster",
    "install-torchsparse",
] }

## Optional
install-da3 = {cmd = "pip install --verbose git+https://github.com/ByteDance-Seed/Depth-Anything-3.git --no-build-isolation"}
install-sam2 = {cmd = "pip install --verbose git+https://github.com/facebookresearch/sam2.git --no-build-isolation"}

verify-installation = {cmd = "python -c \"import torch; from torchsparse import SparseTensor; x = SparseTensor(coords=torch.tensor([[1,2,3,0], [4,5,6,1]], dtype=torch.int32), feats=torch.randn(2, 4)); x = x.cuda(); print('Installation successful!')\""}
